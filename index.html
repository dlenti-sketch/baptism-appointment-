<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book a Meeting</title>
<style>
  :root {
    --bg: #f7f7f5;
    --card: #ffffff;
    --ink: #1a1a1a;
    --muted: #6b6b6b;
    --accent: #2d6cdf;
    --border: #e5e5e2;
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 2rem 1rem;
    line-height: 1.5;
  }
  .container { max-width: 640px; margin: 0 auto; }
  h1 { font-size: 1.75rem; margin: 0 0 0.25rem; font-weight: 600; }
  .subtitle { color: var(--muted); margin: 0 0 2rem; }

  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    box-shadow: var(--shadow);
  }
  .panel h2 { font-size: 1.1rem; margin: 0 0 0.5rem; font-weight: 600; }
  .panel > p { color: var(--muted); margin: 0 0 1.25rem; font-size: 0.95rem; }

  .people-list { display: flex; flex-direction: column; gap: 0.6rem; }
  .person-card {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 1rem 1.1rem;
    border-radius: 10px;
    text-decoration: none;
    color: var(--ink);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .person-card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
    box-shadow: var(--shadow);
    background: white;
  }
  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6b8de8, #2d6cdf);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 1.05rem;
    flex-shrink: 0;
  }
  .person-info { flex: 1; min-width: 0; }
  .person-name { font-weight: 600; font-size: 1rem; }
  .person-title { color: var(--muted); font-size: 0.875rem; margin-top: 0.1rem; }
  .person-arrow { color: var(--muted); font-size: 1.25rem; }
  .person-card:hover .person-arrow { color: var(--accent); }

  .footer {
    text-align: center;
    margin-top: 2rem;
    font-size: 0.8rem;
    color: var(--muted);
  }
</style>
</head>
<body>
<div class="container">
  <h1>Book a meeting</h1>
  <p class="subtitle">Select a leader to open their booking page.</p>

  <div class="panel">
    <h2>Choose a leader</h2>
    <p>Click anyone on the team to schedule a time.</p>
    <div class="people-list" id="people-list"></div>
  </div>

  <div class="footer">Each booking link opens the leader's calendar in a new tab.</div>
</div>

<script>
  const TEAM = [
    { name: "Brandon", title: "Gracestudents Director (4th to 12th grade)", url: "https://calendar.app.google/bPeEU8gaxJg3HqN28" },
    { name: "Mike",    title: "Family Ministry Pastor (all ages)",          url: "https://calendar.app.google/p8kkU4LsJS4TUUas5" },
    { name: "Ey",      title: "Grace Experience Director (all ages)",       url: "https://calendar.app.google/UBmtm3eTrpbDSY1G6" },
    { name: "Joy",     title: "Family Ministry Coordinator (all ages)",     url: "https://calendar.app.google/g66ih1dayn2bA4Rn6" },
    { name: "Rachel",  title: "Gracekids Director (elementary)",            url: "https://calendar.app.google/BxKkWa6W7cqUJweT6" },
  ];

  const list = document.getElementById("people-list");
  TEAM.forEach(p => {
    const card = document.createElement("a");
    card.className = "person-card";
    card.href = p.url;
    card.target = "_blank";
    card.rel = "noopener";
    card.innerHTML = `
      <div class="avatar">${p.name[0]}</div>
      <div class="person-info">
        <div class="person-name">${p.name}</div>
        <div class="person-title">${p.title}</div>
      </div>
      <div class="person-arrow">→</div>
    `;
    list.appendChild(card);
  });
</script>
</body>
</html>
